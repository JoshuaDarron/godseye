<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- GPS/GNSS navigation satellite -->
  <!-- Large solar wings -->
  <rect x="2" y="26" width="20" height="12" rx="1" fill="#2266bb" stroke="#4488dd" stroke-width="1"/>
  <rect x="42" y="26" width="20" height="12" rx="1" fill="#2266bb" stroke="#4488dd" stroke-width="1"/>
  <!-- Wing grid -->
  <line x1="9" y1="26" x2="9" y2="38" stroke="#4488dd" stroke-width="0.5"/>
  <line x1="16" y1="26" x2="16" y2="38" stroke="#4488dd" stroke-width="0.5"/>
  <line x1="49" y1="26" x2="49" y2="38" stroke="#4488dd" stroke-width="0.5"/>
  <line x1="56" y1="26" x2="56" y2="38" stroke="#4488dd" stroke-width="0.5"/>
  <!-- Arms -->
  <rect x="22" y="30" width="4" height="4" fill="#cccccc"/>
  <rect x="38" y="30" width="4" height="4" fill="#cccccc"/>
  <!-- Body -->
  <rect x="24" y="20" width="16" height="24" rx="2" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <!-- Navigation antenna array (distinctive) -->
  <rect x="27" y="14" width="10" height="6" rx="1" fill="#ff8800" stroke="#cc6600" stroke-width="0.5"/>
  <line x1="30" y1="14" x2="30" y2="10" stroke="#ff8800" stroke-width="1.5"/>
  <line x1="34" y1="14" x2="34" y2="10" stroke="#ff8800" stroke-width="1.5"/>
  <!-- Body detail -->
  <rect x="28" y="30" width="8" height="8" rx="1" fill="#88aacc" stroke="#6688aa" stroke-width="0.5"/>
</svg>
