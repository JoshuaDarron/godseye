<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Left solar panel -->
  <rect x="4" y="24" width="18" height="16" rx="1" fill="#4488ff" stroke="#aaccff" stroke-width="1"/>
  <line x1="10" y1="24" x2="10" y2="40" stroke="#aaccff" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="24" x2="16" y2="40" stroke="#aaccff" stroke-width="0.5" opacity="0.5"/>
  <!-- Right solar panel -->
  <rect x="42" y="24" width="18" height="16" rx="1" fill="#4488ff" stroke="#aaccff" stroke-width="1"/>
  <line x1="48" y1="24" x2="48" y2="40" stroke="#aaccff" stroke-width="0.5" opacity="0.5"/>
  <line x1="54" y1="24" x2="54" y2="40" stroke="#aaccff" stroke-width="0.5" opacity="0.5"/>
  <!-- Panel arms -->
  <rect x="22" y="30" width="4" height="4" fill="#cccccc"/>
  <rect x="38" y="30" width="4" height="4" fill="#cccccc"/>
  <!-- Central body -->
  <rect x="24" y="22" width="16" height="20" rx="2" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <!-- Antenna dish -->
  <circle cx="32" cy="18" r="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="32" y1="22" x2="32" y2="18" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Body details -->
  <rect x="27" y="26" width="10" height="3" rx="0.5" fill="#666666"/>
  <rect x="28" y="32" width="8" height="6" rx="1" fill="#88aacc" stroke="#6688aa" stroke-width="0.5"/>
</svg>
