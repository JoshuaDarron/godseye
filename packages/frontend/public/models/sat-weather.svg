<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Weather satellite - drum-shaped with scanner -->
  <!-- Cylindrical body -->
  <rect x="22" y="18" width="20" height="28" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <!-- Scanning instrument (IR/visible) -->
  <rect x="24" y="22" width="16" height="6" rx="1" fill="#44aa66" stroke="#338855" stroke-width="0.5"/>
  <!-- Solar drum texture -->
  <line x1="22" y1="30" x2="42" y2="30" stroke="#bbbbbb" stroke-width="0.5"/>
  <line x1="22" y1="35" x2="42" y2="35" stroke="#bbbbbb" stroke-width="0.5"/>
  <line x1="22" y1="40" x2="42" y2="40" stroke="#bbbbbb" stroke-width="0.5"/>
  <!-- Single solar panel -->
  <rect x="2" y="28" width="18" height="8" rx="1" fill="#2266bb" stroke="#4488dd" stroke-width="1"/>
  <rect x="20" y="30" width="2" height="4" fill="#cccccc"/>
  <!-- Dish antenna -->
  <path d="M42 26 Q52 20 52 32 Q52 44 42 38" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="42" y1="32" x2="50" y2="32" stroke="#ffffff" stroke-width="1"/>
</svg>
