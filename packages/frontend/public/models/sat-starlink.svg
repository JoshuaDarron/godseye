<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Starlink flat-panel satellite -->
  <!-- Main body - flat rectangle -->
  <rect x="12" y="28" width="40" height="8" rx="2" fill="#cccccc" stroke="#999999" stroke-width="1"/>
  <!-- Solar panel surface -->
  <rect x="12" y="28" width="40" height="8" rx="2" fill="#3366cc" opacity="0.6"/>
  <!-- Panel grid lines -->
  <line x1="22" y1="28" x2="22" y2="36" stroke="#5588dd" stroke-width="0.5"/>
  <line x1="32" y1="28" x2="32" y2="36" stroke="#5588dd" stroke-width="0.5"/>
  <line x1="42" y1="28" x2="42" y2="36" stroke="#5588dd" stroke-width="0.5"/>
  <!-- Antenna -->
  <circle cx="32" cy="24" r="3" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="32" y1="28" x2="32" y2="24" stroke="#ffffff" stroke-width="1"/>
</svg>
